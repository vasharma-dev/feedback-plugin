<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create your account — jicama feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --brand:#6C2BD9; --brand-700:#5A1FB8; --ink:#0f172a; --muted:#64748b; --line:#eef2f7; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:#f7f8fb;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--ink); }
    .card { background:#fff; width:min(480px,94vw); border:1px solid var(--line); border-radius:20px;
      padding:32px; box-shadow:0 10px 40px rgba(15,23,42,.07); }
    .logo { width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,var(--brand),var(--brand-700));
      display:grid; place-items:center; font-size:22px; box-shadow:0 6px 16px rgba(108,43,217,.3); }
    .step { font-size:12px; font-weight:700; color:var(--brand); letter-spacing:.05em; text-transform:uppercase; margin-top:16px; }
    h1 { font-size:24px; letter-spacing:-.02em; margin:4px 0 4px; }
    .sub { color:var(--muted); font-size:14px; margin:0 0 22px; }
    .who { display:flex; align-items:center; gap:10px; background:#f8f7fe; border:1px solid #ece8fb;
      border-radius:12px; padding:10px 12px; margin-bottom:22px; font-size:13px; }
    .who .av { width:30px; height:30px; border-radius:999px; background:var(--brand); color:#fff; display:grid; place-items:center; font-weight:600; }
    label { display:block; font-size:13px; font-weight:600; color:#334155; margin:0 0 6px; }
    .field { margin-bottom:16px; }
    input { width:100%; padding:12px 13px; border:1px solid #e2e8f0; border-radius:10px; font:15px Inter; outline:none; transition:border-color .12s, box-shadow .12s; }
    input:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(108,43,217,.15); }
    .btn { width:100%; border:none; border-radius:11px; padding:13px; font:600 15px Inter; cursor:pointer;
      background:var(--brand); color:#fff; box-shadow:0 6px 18px rgba(108,43,217,.32); }
    .btn:hover:not(:disabled){ filter:brightness(1.07); } .btn:disabled{ opacity:.6; cursor:default; }
    .err { background:#fef2f2; border:1px solid #fecaca; color:#b91c1c; border-radius:10px; padding:11px 14px; font-size:14px; margin-bottom:16px; display:none; }
    .foot { text-align:center; color:#94a3b8; font-size:12px; margin-top:18px; }

    /* success */
    #done { display:none; }
    .check { width:54px; height:54px; border-radius:999px; background:#dcfce7; color:#16a34a; display:grid; place-items:center; font-size:27px; margin:0 auto 12px; }
    .keys { background:#0f172a; color:#e7e2ff; border-radius:12px; padding:14px 16px; font:13px ui-monospace,Menlo,Consolas,monospace; margin:10px 0; word-break:break-all; }
    .keys .row { display:flex; justify-content:space-between; gap:12px; padding:4px 0; align-items:center; }
    .keys .k { color:#94a3b8; font-family:Inter; font-size:12px; }
    .copy { background:#1e293b; color:#cbd5e1; border:none; border-radius:6px; padding:3px 9px; font-size:11px; cursor:pointer; }
    .note { font-size:13px; color:var(--muted); margin:14px 0 6px; }
    pre { background:#0f172a; color:#e7e2ff; border-radius:12px; padding:13px; overflow:auto; font-size:12px; line-height:1.5; margin:0 0 14px; white-space:pre-wrap; word-break:break-all; }
  </style>
</head>
<body>
  <div class="card">
    <!-- REGISTRATION -->
    <div id="form">
      <div class="logo">🍠</div>
      <div class="step">Step 2 of 2 · Registration</div>
      <h1>Create your account</h1>
      <p class="sub">Two quick details and your feedback dashboard is ready.</p>

      <div class="who" id="who">Loading your account…</div>
      <div id="err" class="err"></div>

      <div class="field">
        <label for="company">Company / organization name</label>
        <input id="company" placeholder="Acme Inc." autocomplete="organization" />
      </div>
      <div class="field">
        <label for="website">Your website</label>
        <input id="website" placeholder="https://acme.com" autocomplete="url" inputmode="url" />
      </div>

      <button id="submit" class="btn">Complete registration →</button>
      <p class="foot">🍠 jicama feedback</p>
    </div>
  </div>

  <script>
    var $ = function(id){ return document.getElementById(id); };
    function showErr(m){ var e=$("err"); e.textContent="⚠ "+m; e.style.display="block"; }

    // Confirm there's a session; bounce to login if not, to the dashboard if already registered.
    fetch("/v1/me").then(function(r){
      if(r.status===401){ location.href="/login"; return null; }
      return r.json();
    }).then(function(me){
      if(!me) return;
      if(me.onboarded){ location.href="/dashboard"; return; }
      var initial = ((me.user.name || me.user.email)[0]||"?").toUpperCase();
      $("who").innerHTML = '<div class="av">'+initial+'</div><div>Signed in as <b>'+me.user.email+'</b></div>';
      var dom = (me.user.email.split("@")[1]||"").split(".")[0];
      if(dom && dom!=="gmail" && dom!=="googlemail"){
        $("company").value = dom.charAt(0).toUpperCase()+dom.slice(1);
        $("website").value = "https://"+(me.user.email.split("@")[1]||"");
      }
    }).catch(function(){ showErr("Couldn't load your account — is the backend running?"); });

    $("submit").onclick = async function(){
      var company = $("company").value.trim();
      var website = $("website").value.trim();
      if(!company) return showErr("Please enter your company name.");
      if(!website) return showErr("Please enter your website.");
      var btn=this; btn.disabled=true; btn.textContent="Creating…";
      try {
        var r = await fetch("/v1/onboarding", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ company: company, website: website })
        });
        var b = await r.json();
        if(!r.ok) throw new Error(b.message || b.error || "Registration failed");
        // Keys live in the dashboard (Settings → Your API key), not here. Go straight there.
        location.href = "/dashboard";
      } catch(e){ showErr(e.message); btn.disabled=false; btn.textContent="Complete registration →"; }
    };
  </script>
</body>
</html>
