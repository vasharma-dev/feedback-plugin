<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — jicama feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --brand:#6C2BD9; --brand-700:#5A1FB8; --ink:#0f172a; --muted:#64748b; --line:#eef2f7; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center;
      font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--ink);
      background:radial-gradient(800px 360px at 50% -100px, rgba(108,43,217,.14), #f7f8fb 70%); }
    .card { background:#fff; width:min(420px,94vw); border:1px solid var(--line); border-radius:20px;
      padding:34px; box-shadow:0 18px 50px rgba(15,23,42,.10); text-align:center; }
    .logo { width:46px; height:46px; border-radius:12px; margin:0 auto;
      background:linear-gradient(135deg,var(--brand),var(--brand-700)); display:grid; place-items:center;
      font-size:23px; box-shadow:0 6px 16px rgba(108,43,217,.3); }
    h1 { font-size:23px; letter-spacing:-.02em; margin:18px 0 4px; }
    .sub { color:var(--muted); font-size:14px; margin:0 0 24px; }
    .google { display:flex; align-items:center; justify-content:center; gap:11px; width:100%;
      background:#fff; border:1px solid #dadce0; border-radius:11px; padding:13px; font:600 15px Inter;
      color:#3c4043; cursor:pointer; text-decoration:none; transition:box-shadow .12s, border-color .12s; }
    .google:hover { box-shadow:0 1px 4px rgba(60,64,67,.25); border-color:#c7cdd4; }
    .hint { font-size:12px; color:#94a3b8; margin-top:18px; line-height:1.5; }
    .hint code { background:#f1f5f9; padding:1px 6px; border-radius:6px; }
    .back { display:inline-block; margin-top:20px; font-size:13px; color:var(--muted); text-decoration:none; }
    .back:hover { color:var(--ink); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🍠</div>
    <h1>Sign in to jicama feedback</h1>
    <p class="sub">New here? Signing in sets up your organization automatically.</p>

    <a class="google" href="/auth/google">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </a>

    <p class="hint">New here? We'll set up your organization right after you sign in. Already
      registered? You'll go straight to your dashboard.</p>

    <a class="back" href="/">← Back to jicama feedback</a>
  </div>
</body>
</html>
